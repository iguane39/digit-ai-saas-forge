<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Process · digit-ai-saas-forge</title>
<style>
  :root {
    --bg:#fff; --bg-soft:#f7f8fa; --ink:#0f172a; --ink-soft:#334155; --ink-muted:#64748b;
    --line:#e2e8f0; --line-strong:#cbd5e1;
    --c-purple-bg:#ede9fe; --c-purple-fg:#5b21b6; --c-purple-stroke:#c4b5fd;
    --c-blue-bg:#dbeafe; --c-blue-fg:#1d4ed8; --c-blue-stroke:#93c5fd;
    --c-teal-bg:#ccfbf1; --c-teal-fg:#0f766e; --c-teal-stroke:#5eead4;
    --c-coral-bg:#fee2e2; --c-coral-fg:#b91c1c; --c-coral-stroke:#fca5a5;
    --c-amber-bg:#fef3c7; --c-amber-fg:#92400e; --c-amber-stroke:#fcd34d;
    --c-gray-bg:#f1f3f7; --c-gray-fg:#374151; --c-gray-stroke:#cbd5e1;
    --sans:'DM Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --display:'Roboto',system-ui,-apple-system,'Segoe UI',sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { background:var(--bg); color:var(--ink); font-family:var(--sans); line-height:1.55; -webkit-font-smoothing:antialiased; }
  .page { max-width:1280px; margin:0 auto; padding:34px 24px 56px; }

  .langbar { display:flex; gap:6px; justify-content:flex-end; margin-bottom:18px; flex-wrap:wrap; }
  .langbar button { font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-muted); background:#fff; border:1px solid var(--line); border-radius:100px; padding:4px 11px; cursor:pointer; }
  .langbar button.active { color:var(--c-purple-fg); border-color:var(--c-purple-stroke); background:var(--c-purple-bg); }

  .header { border-bottom:1px solid var(--line); padding-bottom:26px; margin-bottom:28px; }
  .eyebrow { font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:12px; }
  h1 { font-family:var(--display); font-weight:800; font-size:clamp(26px,3.6vw,40px); line-height:1.12; letter-spacing:-.02em; margin-bottom:12px; }
  h1 .accent { color:var(--c-purple-fg); }
  .lede { font-size:16.5px; color:var(--ink-soft); max-width:900px; margin-bottom:18px; }
  .meta { display:flex; flex-wrap:wrap; gap:22px; font-family:var(--mono); font-size:11.5px; color:var(--ink-muted); }
  .meta b { color:var(--ink); font-weight:700; }

  .diagram-wrap { background:var(--bg-soft); border:1px solid var(--line); border-radius:12px; padding:26px 22px; margin:8px 0 16px; overflow-x:auto; }
  .band-label { font-family:var(--mono); font-size:10.5px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-muted); margin:4px 0 10px; display:flex; align-items:center; gap:10px; }
  .band-label::after { content:""; flex:1; height:1px; background:var(--line); }

  .inputs { display:flex; flex-wrap:wrap; gap:12px; align-items:stretch; }
  .chip-in { background:#fff; border:1px solid var(--c-gray-stroke); border-left:3px solid var(--c-gray-fg); border-radius:8px; padding:11px 15px; flex:1 1 250px; min-width:230px; max-width:360px; }
  .chip-always { border-left-color:var(--ink-muted); }
  .chip-in .t { font-family:var(--display); font-weight:700; font-size:13.5px; color:var(--ink); }
  .chip-in .s { font-size:12px; color:var(--ink-muted); }
  .chip-in .opt { font-family:var(--mono); font-size:9.5px; color:var(--c-amber-fg); background:var(--c-amber-bg); padding:1px 6px; border-radius:100px; margin-left:6px; }
  .chip-in .ex { font-size:10.5px; color:var(--ink-muted); margin-top:6px; line-height:1.5; border-top:1px dashed var(--line); padding-top:5px; }
  .link-or { align-self:center; font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:.06em; color:var(--c-amber-fg); background:var(--c-amber-bg); border:1px solid var(--c-amber-stroke); border-radius:100px; padding:4px 9px; flex:0 0 auto; }
  .link-plus { align-self:center; font-family:var(--mono); font-size:15px; font-weight:700; color:var(--ink-muted); background:var(--c-gray-bg); border:1px solid var(--line-strong); border-radius:100px; width:27px; height:27px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
  .inputs-note { font-size:11.5px; color:var(--ink-muted); margin:9px 0 2px; line-height:1.55; }
  .inputs-note b { color:var(--ink-soft); font-weight:700; }

  .spine { display:flex; align-items:stretch; gap:0; min-width:1080px; margin-top:6px; }
  .step { flex:1; display:flex; flex-direction:column; }
  .arrow { align-self:center; color:var(--ink-muted); font-size:20px; padding:0 4px; flex:0 0 auto; }
  .node { background:#fff; border:1px solid var(--line); border-top:3px solid var(--ink-muted); border-radius:10px; padding:13px; height:100%; cursor:help; transition:box-shadow .12s; }
  .node:hover { box-shadow:0 4px 14px rgba(15,23,42,.12); }
  .node .tag { font-family:var(--mono); font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-muted); }
  .node .ti { font-family:var(--display); font-weight:700; font-size:14px; color:var(--ink); margin:4px 0 5px; line-height:1.2; }
  .node .de { font-size:11.5px; color:var(--ink-soft); line-height:1.4; }
  .n-blue{border-top-color:var(--c-blue-fg);} .n-blue .tag{color:var(--c-blue-fg);}
  .n-purple{border-top-color:var(--c-purple-fg);} .n-purple .tag{color:var(--c-purple-fg);}
  .n-teal{border-top-color:var(--c-teal-fg);} .n-teal .tag{color:var(--c-teal-fg);}
  .n-amber{border-top-color:var(--c-amber-fg);background:#fffdf6;} .n-amber .tag{color:var(--c-amber-fg);}
  .n-amber .ti::before{content:"⛔ ";}

  .gates { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
  .gate { font-family:var(--mono); font-size:10px; background:var(--c-coral-bg); color:var(--c-coral-fg); border:1px solid var(--c-coral-stroke); border-radius:6px; padding:4px 8px; cursor:help; }

  .loop { margin:14px 0 4px; min-width:1080px; display:flex; align-items:center; gap:12px; background:#fff; border:1px dashed var(--c-purple-stroke); border-radius:8px; padding:10px 16px; }
  .loop .ic { font-size:18px; color:var(--c-purple-fg); }
  .loop .tx { font-size:12.5px; color:var(--ink-soft); } .loop .tx b{ color:var(--c-purple-fg); font-family:var(--display); }
  .out-note { margin-top:14px; background:var(--c-teal-bg); border:1px solid var(--c-teal-stroke); border-radius:8px; padding:11px 16px; font-size:13px; color:var(--c-teal-fg); }
  .out-note b{font-weight:700;} .out-note code{font-family:var(--mono);font-size:.85em;background:#fff;padding:1px 5px;border-radius:3px;}

  .legend { display:flex; flex-wrap:wrap; gap:14px 22px; margin-top:18px; font-size:12px; color:var(--ink-soft); }
  .legend .it { display:flex; align-items:center; gap:7px; }
  .sw { width:14px; height:14px; border-radius:3px; border:1px solid; }
  .sw-gray{background:var(--c-gray-bg);border-color:var(--c-gray-fg);} .sw-blue{background:var(--c-blue-bg);border-color:var(--c-blue-fg);}
  .sw-purple{background:var(--c-purple-bg);border-color:var(--c-purple-fg);} .sw-amber{background:var(--c-amber-bg);border-color:var(--c-amber-fg);}
  .sw-coral{background:var(--c-coral-bg);border-color:var(--c-coral-fg);} .sw-teal{background:var(--c-teal-bg);border-color:var(--c-teal-fg);}
  .caption { font-size:12.5px; color:var(--ink-muted); font-style:italic; margin-top:6px; }

  .footer { margin-top:44px; padding-top:22px; border-top:1px solid var(--line); display:flex; justify-content:space-between; flex-wrap:wrap; gap:12px; font-size:12px; color:var(--ink-muted); }
  .footer .brand { font-family:var(--display); font-weight:700; letter-spacing:.06em; }
  @media print { .langbar{display:none;} .page{padding:0;max-width:100%;} .diagram-wrap{background:#fff;overflow:visible;} .spine,.loop{min-width:0;} }
</style>
</head>
<body>
<div class="page">

  <div class="langbar" id="langbar">
    <button data-lang="fr">FR</button><button data-lang="en">EN</button><button data-lang="es">ES</button>
    <button data-lang="de">DE</button><button data-lang="it">IT</button><button data-lang="pt">PT</button>
  </div>

  <header class="header">
    <div class="eyebrow" data-i="eyebrow"></div>
    <h1><span data-i="h1a"></span> <span class="accent" data-i="h1acc"></span><span data-i="h1b"></span></h1>
    <p class="lede" data-i="lede"></p>
    <div class="meta">
      <span><b data-i="mL1"></b> <span data-i="mV1"></span></span>
      <span><b data-i="mL2"></b> <span data-i="mV2"></span></span>
      <span><b data-i="mL3"></b> <span data-i="mV3"></span></span>
    </div>
  </header>

  <div class="diagram-wrap">
    <div class="band-label" data-i="bandIn"></div>
    <div class="inputs">
      <div class="chip-in" data-t="ckTip">
        <div class="t"><span data-i="ckT"></span> <span class="opt" data-i="cond"></span></div>
        <div class="s" data-i="ckS"></div><div class="ex" data-i="ckE"></div>
      </div>
      <div class="link-or" data-i="orL" data-t="orTip"></div>
      <div class="chip-in" data-t="appTip">
        <div class="t"><span data-i="appT"></span> <span class="opt" data-i="cond"></span></div>
        <div class="s" data-i="appS"></div><div class="ex" data-i="appE"></div>
      </div>
      <div class="link-plus" data-t="plusTip">+</div>
      <div class="chip-in chip-always" data-t="ctTip">
        <div class="t" data-i="ctT"></div><div class="s" data-i="ctS"></div><div class="ex" data-i="ctE"></div>
      </div>
    </div>
    <div class="inputs-note" data-h="note"></div>

    <div class="band-label" style="margin-top:18px;" data-i="bandChain"></div>
    <div class="spine">
      <div class="step"><div class="node n-blue" data-t="t_on"><div class="tag" data-i="g_on"></div><div class="ti" data-i="ti_on"></div><div class="de" data-i="de_on"></div></div></div>
      <div class="arrow">›</div>
      <div class="step"><div class="node n-purple" data-t="t_a"><div class="tag">A</div><div class="ti" data-i="ti_a"></div><div class="de" data-i="de_a"></div></div></div>
      <div class="arrow">›</div>
      <div class="step"><div class="node n-purple" data-t="t_b"><div class="tag">B</div><div class="ti" data-i="ti_b"></div><div class="de" data-i="de_b"></div></div></div>
      <div class="arrow">›</div>
      <div class="step"><div class="node n-purple" data-t="t_c"><div class="tag">C</div><div class="ti" data-i="ti_c"></div><div class="de" data-i="de_c"></div></div></div>
      <div class="arrow">›</div>
      <div class="step"><div class="node n-amber" data-t="t_h1"><div class="tag" data-i="g_ck"></div><div class="ti">HITL 1</div><div class="de" data-i="de_h1"></div></div></div>
      <div class="arrow">›</div>
      <div class="step"><div class="node n-purple" data-t="t_d"><div class="tag">D</div><div class="ti" data-i="ti_d"></div><div class="de" data-i="de_d"></div></div></div>
      <div class="arrow">›</div>
      <div class="step">
        <div class="node n-purple" data-t="t_e"><div class="tag">E</div><div class="ti" data-i="ti_e"></div><div class="de" data-i="de_e"></div></div>
        <div class="gates">
          <div class="gate" data-i="ga1" data-t="ga1t"></div>
          <div class="gate" data-i="ga2" data-t="ga2t"></div>
          <div class="gate" data-i="ga3" data-t="ga3t"></div>
        </div>
      </div>
      <div class="arrow">›</div>
      <div class="step"><div class="node n-amber" data-t="t_h2"><div class="tag" data-i="g_ck"></div><div class="ti">HITL 2</div><div class="de" data-i="de_h2"></div></div></div>
      <div class="arrow">›</div>
      <div class="step"><div class="node n-teal" data-t="t_out"><div class="tag" data-i="g_out"></div><div class="ti">PR-ready</div><div class="de" data-i="de_out"></div></div></div>
    </div>

    <div class="loop"><span class="ic">↻</span><span class="tx" data-h="loop"></span></div>
    <div class="out-note" data-h="outNote"></div>

    <div class="legend">
      <span class="it"><span class="sw sw-gray"></span> <span data-i="lg1"></span></span>
      <span class="it"><span class="sw sw-blue"></span> <span data-i="lg2"></span></span>
      <span class="it"><span class="sw sw-purple"></span> <span data-i="lg3"></span></span>
      <span class="it"><span class="sw sw-amber"></span> <span data-i="lg4"></span></span>
      <span class="it"><span class="sw sw-coral"></span> <span data-i="lg5"></span></span>
      <span class="it"><span class="sw sw-teal"></span> <span data-i="lg6"></span></span>
    </div>
  </div>
  <p class="caption" data-i="cap"></p>

  <footer class="footer"><div class="brand">DIGIT-AI · CONSEIL ET STRATÉGIE IA</div><div data-i="foot"></div></footer>
</div>

function applyLang(lang){
  const d = I18N[lang] || I18N.en;
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i]').forEach(el=>{ const k=el.getAttribute('data-i'); if(d[k]!=null) el.textContent=d[k]; });
  document.querySelectorAll('[data-h]').forEach(el=>{ const k=el.getAttribute('data-h'); if(d[k]!=null) el.innerHTML=d[k]; });
  document.querySelectorAll('[data-t]').forEach(el=>{ const k=el.getAttribute('data-t'); if(d[k]!=null) el.title=d[k]; });
  document.querySelectorAll('#langbar button').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
}
const SUP=['fr','en','es','de','it','pt'];
function pick(){ const q=new URLSearchParams(location.search).get('lang'); if(q&&SUP.includes(q))return q; const n=(navigator.language||'fr').slice(0,2); return SUP.includes(n)?n:'fr'; }
document.getElementById('langbar').addEventListener('click',e=>{ if(e.target.dataset.lang) applyLang(e.target.dataset.lang); });
applyLang(pick());
</script>
